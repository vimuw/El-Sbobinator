<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Sbobinator</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('el-sbobinator.theme.v1');
          var resolved = theme === 'light' || theme === 'dark'
            ? theme
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <style>
      :root {
        --boot-bg: #f7f5f2;
        --boot-panel: #faf9f7;
        --boot-surface: #ffffff;
        --boot-border: rgba(100, 116, 139, 0.20);
        --boot-text: #111827;
        --boot-muted: #6b7280;
        --boot-title-a: #111827;
        --boot-title-b: #374151;
      }

      :root[data-theme="dark"] {
        --boot-bg: #0f0f0f;
        --boot-panel: #1a1a1a;
        --boot-surface: #161616;
        --boot-border: rgba(255, 255, 255, 0.09);
        --boot-text: #f5f5f5;
        --boot-muted: #9ca3af;
        --boot-title-a: #f5f5f5;
        --boot-title-b: #d1d5db;
      }

      html, body, #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 30%),
          var(--boot-bg);
        color: var(--boot-text);
        font-family: "Manrope", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .boot-header {
        min-height: 84px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid var(--boot-border);
        background: rgba(16, 13, 11, 0.02);
      }

      .boot-brand {
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1;
        background: linear-gradient(90deg, var(--boot-title-a), var(--boot-title-b));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .boot-main {
        width: min(1152px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 32px 0;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .boot-card {
        border: 1px solid var(--boot-border);
        border-radius: 12px;
        background: var(--boot-panel);
        box-shadow: none;
      }

      .boot-dropzone {
        min-height: 260px;
        border-style: dashed;
        border-width: 2px;
        border-color: var(--boot-border);
        background: transparent;
      }

      .boot-queue {
        padding: 24px;
      }

      .boot-queue-title {
        width: 280px;
        height: 22px;
        border-radius: 999px;
        background: var(--boot-surface);
      }

      .boot-queue-item {
        margin-top: 22px;
        height: 96px;
        border-radius: 8px;
        border: 1px solid var(--boot-border);
        background: var(--boot-surface);
      }

      .boot-console {
        height: 98px;
        border-radius: 8px;
        border: 1px solid var(--boot-border);
        background: var(--boot-panel);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <header class="boot-header">
          <div class="boot-brand">El Sbobinator</div>
        </header>
        <main class="boot-main">
          <div class="boot-card boot-dropzone"></div>
          <section class="boot-card boot-queue">
            <div class="boot-queue-title"></div>
            <div class="boot-queue-item"></div>
          </section>
          <div class="boot-console"></div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
